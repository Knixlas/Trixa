<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Trixa</title>
<style>
:root {
  --bg: #0f0f13;
  --surface: #1a1a24;
  --surface2: #22222e;
  --accent: #14919b;
  --accent2: #0d7377;
  --text: #e8e8ed;
  --text-dim: #8888a0;
  --danger: #e74c3c;
  --nav-h: 60px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg); color: var(--text);
  height: 100dvh; overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── Layout ── */
#app { display: flex; flex-direction: column; height: 100dvh; }
.view {
  flex: 1; overflow-y: auto;
  padding: 1rem 1rem calc(var(--nav-h) + var(--safe-bottom) + 0.5rem);
  display: none;
}
.view.active { display: block; }

/* ── Bottom Nav ── */
nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(var(--nav-h) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: var(--surface); border-top: 1px solid #2a2a3a;
  display: flex; z-index: 100;
}
nav button {
  flex: 1; background: none; border: none; color: var(--text-dim);
  font-size: 0.7rem; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 2px;
  cursor: pointer; transition: color 0.2s;
}
nav button.active { color: var(--accent); }
nav button svg { width: 22px; height: 22px; }

/* ── Auth ── */
#auth-view {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100dvh; padding: 2rem;
}
#auth-view h1 { font-size: 2.5rem; margin-bottom: 0.3rem; }
#auth-view .subtitle { color: var(--text-dim); margin-bottom: 2rem; }
.auth-form { width: 100%; max-width: 340px; }
.auth-tabs { display: flex; margin-bottom: 1.5rem; }
.auth-tabs button {
  flex: 1; padding: 0.7rem; background: var(--surface);
  border: 1px solid #2a2a3a; color: var(--text-dim); cursor: pointer;
  font-size: 0.9rem; transition: all 0.2s;
}
.auth-tabs button:first-child { border-radius: 8px 0 0 8px; }
.auth-tabs button:last-child { border-radius: 0 8px 8px 0; }
.auth-tabs button.active { background: var(--accent); color: white; border-color: var(--accent); }

input[type="text"], input[type="email"], input[type="password"] {
  width: 100%; padding: 0.8rem 1rem; background: var(--surface);
  border: 1px solid #2a2a3a; border-radius: 8px; color: var(--text);
  font-size: 1rem; margin-bottom: 0.8rem; outline: none;
}
input:focus { border-color: var(--accent); }

.btn {
  width: 100%; padding: 0.8rem; background: var(--accent);
  border: none; border-radius: 8px; color: white; font-size: 1rem;
  cursor: pointer; font-weight: 600;
}
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-secondary { background: var(--surface2); border: 1px solid #2a2a3a; }
.btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
.btn-sm { padding: 0.5rem 1rem; font-size: 0.85rem; width: auto; }
.error-msg { color: var(--danger); font-size: 0.85rem; margin-bottom: 0.5rem; text-align: center; }
.success-msg { color: #2ecc71; font-size: 0.85rem; margin-bottom: 0.5rem; text-align: center; }

/* ── Header ── */
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
.header h1 { font-size: 1.5rem; }
.header .user-name { font-size: 0.85rem; color: var(--text-dim); }

/* ── Status Strip (compact) ── */
.status-strip {
  display: flex; gap: 0.5rem; margin-bottom: 0.8rem; overflow-x: auto;
  scrollbar-width: none; -webkit-overflow-scrolling: touch;
}
.status-strip::-webkit-scrollbar { display: none; }
.status-chip {
  background: var(--surface); border-radius: 20px; padding: 0.4rem 0.8rem;
  font-size: 0.75rem; white-space: nowrap; display: flex; align-items: center; gap: 0.3rem;
}
.status-chip .dot { width: 6px; height: 6px; border-radius: 50%; }
.dot-green { background: #2ecc71; }
.dot-yellow { background: #f39c12; }
.dot-red { background: #e74c3c; }

/* ── Tip Box ── */
.tip-box {
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  border-radius: 12px; padding: 0.8rem 1rem; margin-bottom: 0.8rem;
}
.tip-box .tip-label { font-size: 0.65rem; opacity: 0.7; text-transform: uppercase; letter-spacing: 1px; }
.tip-box .tip-text { font-size: 0.85rem; margin-top: 0.2rem; line-height: 1.5; }

/* ── Section Card (collapsible on iPhone) ── */
.section-card {
  background: var(--surface); border-radius: 12px; margin-bottom: 0.6rem; overflow: hidden;
}
.section-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0.7rem 1rem; cursor: pointer; user-select: none;
}
.section-header h3 { font-size: 0.9rem; margin: 0; display: flex; align-items: center; gap: 0.4rem; }
.section-header .chevron { font-size: 0.7rem; color: var(--text-dim); transition: transform 0.2s; }
.section-card.open .chevron { transform: rotate(90deg); }
.section-body { padding: 0 1rem 0.7rem; display: none; }
.section-card.open .section-body { display: block; }

/* ── Upcoming Workouts ── */
.upcoming-day {
  display: flex; align-items: center; gap: 0.6rem;
  padding: 0.5rem 0; border-bottom: 1px solid #2a2a3a;
}
.upcoming-day:last-child { border-bottom: none; }
.upcoming-day .day-label { font-size: 0.75rem; color: var(--accent); font-weight: 600; width: 28px; }
.upcoming-day .day-desc { font-size: 0.85rem; flex: 1; }
.upcoming-day .day-time { font-size: 0.75rem; color: var(--text-dim); }

/* ── Zones Table ── */
.zones-table { width: 100%; font-size: 0.8rem; }
.zones-table td { padding: 0.3rem 0.4rem; }
.zones-table .zone-label { color: var(--text-dim); }
.zones-table .zone-bar {
  height: 6px; border-radius: 3px; display: inline-block; vertical-align: middle;
}

/* ── Strava Activities ── */
.activities-section { margin-bottom: 0.6rem; }
.activities-section h2 { font-size: 1rem; margin-bottom: 0.4rem; }
.activity-item {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.5rem; background: var(--surface); border-radius: 8px;
  margin-bottom: 0.3rem; font-size: 0.8rem;
}
.activity-icon { font-size: 1.1rem; width: 24px; text-align: center; }
.activity-details { flex: 1; }
.activity-details .name { font-weight: 600; font-size: 0.8rem; }
.activity-details .stats { color: var(--text-dim); font-size: 0.75rem; }
.activity-date { color: var(--text-dim); font-size: 0.7rem; white-space: nowrap; }
.strava-btn {
  width: 100%; padding: 0.5rem; background: #fc4c02; border: none;
  border-radius: 8px; color: white; font-size: 0.85rem; font-weight: 600;
  cursor: pointer; margin-top: 0.4rem;
}
.strava-btn:hover { opacity: 0.9; }
.strava-btn.disconnect { background: transparent; border: 1px solid var(--text-dim); color: var(--text-dim); font-weight: 400; }

/* ── Plan ── */
.plan-section h2 { font-size: 1rem; margin-bottom: 0.4rem; }
.plan-content { line-height: 1.6; font-size: 0.85rem; white-space: pre-wrap; }
.plan-empty { text-align: center; padding: 1.5rem 1rem; color: var(--text-dim); font-size: 0.85rem; }

/* ── Chat ── */
#chat-view { display: none; flex-direction: column; padding-bottom: 0; }
#chat-view.active { display: flex; }
.chat-messages { flex: 1; overflow-y: auto; padding: 1rem 1rem 0.5rem; }
.msg {
  max-width: 85%; margin-bottom: 0.8rem; padding: 0.7rem 1rem;
  border-radius: 16px; font-size: 0.9rem; line-height: 1.6; word-wrap: break-word;
}
.msg.user { background: var(--accent); margin-left: auto; border-bottom-right-radius: 4px; }
.msg.assistant { background: var(--surface2); border-bottom-left-radius: 4px; }
.msg .workout-btns { margin-top: 0.5rem; display: flex; gap: 0.5rem; }
.msg .workout-btns button {
  padding: 0.4rem 0.8rem; font-size: 0.8rem;
  background: var(--accent2); border: none; border-radius: 6px;
  color: white; cursor: pointer;
}
.chat-input-bar {
  padding: 0.5rem 1rem calc(var(--nav-h) + var(--safe-bottom) + 0.5rem);
  background: var(--bg); border-top: 1px solid #2a2a3a;
  display: flex; flex-direction: column; gap: 0.5rem;
}
.chat-input-row { display: flex; gap: 0.5rem; }
.chat-input-row input {
  flex: 1; padding: 0.7rem 1rem; background: var(--surface);
  border: 1px solid #2a2a3a; border-radius: 20px;
  color: var(--text); font-size: 0.95rem; outline: none;
}
.chat-input-row button {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--accent); border: none; color: white;
  font-size: 1.2rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.chat-input-row button:disabled { opacity: 0.4; }
.img-btn { background: var(--surface2) !important; border: 1px solid #2a2a3a !important; font-size: 1rem !important; }
.img-preview-bar {
  display: flex; gap: 0.5rem; flex-wrap: wrap;
}
.img-preview-bar .img-thumb {
  position: relative; width: 60px; height: 60px; border-radius: 8px; overflow: hidden;
}
.img-preview-bar .img-thumb img { width: 100%; height: 100%; object-fit: cover; }
.img-preview-bar .img-thumb .remove-img {
  position: absolute; top: -4px; right: -4px; width: 20px; height: 20px;
  background: var(--danger); border: none; border-radius: 50%;
  color: white; font-size: 0.7rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.msg img.chat-image { max-width: 100%; border-radius: 8px; margin-top: 0.5rem; }

/* ── Profile ── */
.profile-section {
  background: var(--surface); border-radius: 12px;
  padding: 1rem; margin-bottom: 0.8rem;
}
.profile-section h3 { font-size: 0.95rem; margin-bottom: 0.7rem; opacity: 0.8; }
.profile-row { display: flex; justify-content: space-between; margin-bottom: 0.4rem; font-size: 0.9rem; }
.profile-row .label { color: var(--text-dim); }
.profile-input { margin-bottom: 0.6rem; }
.profile-input label { display: block; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 0.3rem; }
.profile-input input { font-size: 0.9rem; padding: 0.6rem 0.8rem; }

/* ── Desktop ── */
@media (min-width: 769px) {
  .view, #chat-view .chat-messages, .chat-input-bar {
    max-width: 600px; margin-left: auto; margin-right: auto;
  }
}
</style>
</head>
<body>
<div id="app">

<!-- AUTH -->
<div id="auth-view">
  <h1>Trixa</h1>
  <p class="subtitle">Din personliga AI-tranare</p>
  <div class="auth-form">
    <div class="auth-tabs">
      <button class="active" onclick="showAuthTab('login')">Logga in</button>
      <button onclick="showAuthTab('signup')">Skapa konto</button>
    </div>
    <div id="auth-error" class="error-msg" style="display:none"></div>
    <div id="auth-success" class="success-msg" style="display:none"></div>
    <div id="login-fields">
      <input type="email" id="login-email" placeholder="E-post">
      <input type="password" id="login-pw" placeholder="Losenord">
      <button class="btn" id="login-btn" onclick="doLogin()">Logga in</button>
    </div>
    <div id="signup-fields" style="display:none">
      <input type="text" id="signup-name" placeholder="Ditt namn">
      <input type="email" id="signup-email" placeholder="E-post">
      <input type="password" id="signup-pw" placeholder="Losenord (minst 6 tecken)">
      <button class="btn" id="signup-btn" onclick="doSignup()">Skapa konto</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="main-app" style="display:none">

  <!-- HEM -->
  <div id="home-view" class="view active">
    <div class="header">
      <h1>Trixa</h1>
      <span class="user-name" id="user-name-display"></span>
    </div>
    <div class="status-strip" id="status-strip"></div>
    <div id="tip-container"></div>

    <!-- Kommande pass -->
    <div class="section-card open" id="card-upcoming">
      <div class="section-header" onclick="toggleSection('card-upcoming')">
        <h3>&#x1F3CB; Kommande pass</h3><span class="chevron">&#x25B6;</span>
      </div>
      <div class="section-body" id="upcoming-body">
        <div class="plan-empty">Be Trixa om en veckoplan!</div>
      </div>
    </div>

    <!-- Zoner -->
    <div class="section-card" id="card-zones">
      <div class="section-header" onclick="toggleSection('card-zones')">
        <h3>&#x1F4CA; Zoner</h3><span class="chevron">&#x25B6;</span>
      </div>
      <div class="section-body" id="zones-body">
        <div style="color:var(--text-dim);font-size:0.85rem">Inga zoner sparade. Be Trixa berakna!</div>
      </div>
    </div>

    <!-- Senaste traning -->
    <div class="section-card open" id="card-activities">
      <div class="section-header" onclick="toggleSection('card-activities')">
        <h3>&#x1F3C3; Senaste traning</h3><span class="chevron">&#x25B6;</span>
      </div>
      <div class="section-body" id="strava-activities"></div>
    </div>

    <!-- Veckoplan -->
    <div class="section-card" id="card-plan">
      <div class="section-header" onclick="toggleSection('card-plan')">
        <h3>&#x1F4C5; Veckoplan</h3><span class="chevron">&#x25B6;</span>
      </div>
      <div class="section-body" id="plan-content"></div>
    </div>
  </div>

  <!-- CHATT -->
  <div id="chat-view" class="view">
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-bar">
      <div class="img-preview-bar" id="img-preview-bar"></div>
      <div class="chat-input-row">
        <button class="img-btn" onclick="document.getElementById('img-input').click()" title="Bifoga bild">&#x1F4F7;</button>
        <input type="text" id="chat-input" placeholder="Skriv till Trixa..." onkeydown="if(event.key==='Enter')sendMessage()">
        <button onclick="sendMessage()" id="send-btn">&#x2191;</button>
      </div>
      <input type="file" id="img-input" accept="image/*" multiple style="display:none" onchange="handleImageSelect(event)">
    </div>
  </div>

  <!-- PROFIL -->
  <div id="profile-view" class="view">
    <div class="header"><h1>Profil</h1></div>
    <div class="profile-section" id="profile-info"></div>
    <div class="profile-section" id="strava-section">
      <h3>Strava</h3>
      <div id="strava-status"></div>
    </div>

    <div class="profile-section">
      <h3>Intervals.icu</h3>
      <div class="profile-input">
        <label>API-nyckel</label>
        <input type="password" id="icu-key">
      </div>
      <div class="profile-input">
        <label>Athlete ID</label>
        <input type="text" id="icu-athlete" placeholder="t.ex. i12345">
      </div>
      <button class="btn btn-sm" onclick="saveIntervals()">Spara</button>
    </div>
    <div class="profile-section" id="membership-section"></div>
    <div class="profile-section" id="discount-section">
      <h3>Rabattkod</h3>
      <div style="display:flex;gap:0.5rem">
        <input type="text" id="discount-input" placeholder="Ange kod" style="flex:1;text-transform:uppercase">
        <button class="btn btn-sm" onclick="applyDiscount()">Aktivera</button>
      </div>
    </div>
    <div style="margin-top:1rem;display:flex;gap:0.5rem">
      <button class="btn btn-secondary btn-sm" onclick="newConversation()" style="flex:1">Ny konversation</button>
      <button class="btn btn-danger btn-sm" onclick="doLogout()" style="flex:1">Logga ut</button>
    </div>
  </div>

  <!-- NAV -->
  <nav>
    <button class="active" onclick="switchTab('home')" id="nav-home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l9-9 9 9M5 10v10a1 1 0 001 1h3a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1h3a1 1 0 001-1V10"/></svg>
      Hem
    </button>
    <button onclick="switchTab('chat')" id="nav-chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      Chatt
    </button>
    <button onclick="switchTab('profile')" id="nav-profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="7" r="4"/><path d="M5.5 21a6.5 6.5 0 0113 0"/></svg>
      Profil
    </button>
  </nav>
</div>
</div>

<script>
let user = JSON.parse(localStorage.getItem('trixa_user') || 'null');
let chatHistory = [];
let pendingImages = []; // [{base64, dataUrl, mediaType}]

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function md(text) {
  if (!text) return '';
  return esc(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm, '<h3 style="font-size:1rem;margin:0.5rem 0 0.3rem">$1</h3>')
    .replace(/^## (.+)$/gm, '<h2 style="font-size:1.1rem;margin:0.5rem 0 0.3rem">$1</h2>')
    .replace(/^[-*] (.+)$/gm, '&bull; $1<br>')
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');
}

function hdrs() {
  return {
    'Authorization': 'Bearer ' + (user?.access_token || ''),
    'X-User-Id': user?.user_id || '',
    'X-User-Email': user?.email || '',
    'Content-Type': 'application/json',
  };
}

// ── Auth ──
function showAuthTab(tab) {
  document.querySelectorAll('.auth-tabs button').forEach(b => b.classList.remove('active'));
  document.getElementById('auth-error').style.display = 'none';
  document.getElementById('auth-success').style.display = 'none';
  if (tab === 'login') {
    document.querySelectorAll('.auth-tabs button')[0].classList.add('active');
    document.getElementById('login-fields').style.display = 'block';
    document.getElementById('signup-fields').style.display = 'none';
  } else {
    document.querySelectorAll('.auth-tabs button')[1].classList.add('active');
    document.getElementById('login-fields').style.display = 'none';
    document.getElementById('signup-fields').style.display = 'block';
  }
}

async function doLogin() {
  const email = document.getElementById('login-email').value;
  const pw = document.getElementById('login-pw').value;
  if (!email || !pw) return;
  document.getElementById('login-btn').disabled = true;
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password: pw}),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.detail || 'Login failed');
    user = data;
    localStorage.setItem('trixa_user', JSON.stringify(user));
    showApp();
  } catch (e) {
    document.getElementById('auth-error').textContent = e.message;
    document.getElementById('auth-error').style.display = 'block';
  }
  document.getElementById('login-btn').disabled = false;
}

async function doSignup() {
  const name = document.getElementById('signup-name').value;
  const email = document.getElementById('signup-email').value;
  const pw = document.getElementById('signup-pw').value;
  if (!name || !email || !pw) return;
  if (pw.length < 6) {
    document.getElementById('auth-error').textContent = 'Losenordet maste vara minst 6 tecken';
    document.getElementById('auth-error').style.display = 'block';
    return;
  }
  document.getElementById('signup-btn').disabled = true;
  try {
    const r = await fetch('/api/auth/signup', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password: pw, name}),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.detail || 'Signup failed');
    document.getElementById('auth-success').textContent = data.message;
    document.getElementById('auth-success').style.display = 'block';
    showAuthTab('login');
  } catch (e) {
    document.getElementById('auth-error').textContent = e.message;
    document.getElementById('auth-error').style.display = 'block';
  }
  document.getElementById('signup-btn').disabled = false;
}

function doLogout() {
  localStorage.removeItem('trixa_user');
  user = null; chatHistory = [];
  location.reload();
}

// ── Navigation ──
function switchTab(tab) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  const views = {home:'home-view', chat:'chat-view', profile:'profile-view'};
  const navs = {home:'nav-home', chat:'nav-chat', profile:'nav-profile'};
  document.getElementById(views[tab]).classList.add('active');
  document.getElementById(navs[tab]).classList.add('active');
  if (tab === 'chat') {
    const c = document.getElementById('chat-messages');
    setTimeout(() => { c.scrollTop = c.scrollHeight; }, 50);
    document.getElementById('chat-input').focus();
  }
}

// ── Section toggle ──
function toggleSection(id) {
  document.getElementById(id).classList.toggle('open');
}

// ── Home ──
function renderHome() {
  document.getElementById('user-name-display').textContent = user?.name || user?.email || '';

  // Status strip
  const tierLabel = user?.trial_days > 0 ? `Trial ${user.trial_days}d` : (user?.tier === 'premium' ? 'Premium' : 'Gratis');
  const stravaLabel = stravaData.connected ? 'Strava' : 'Strava ej kopplad';
  const stravaDot = stravaData.connected ? 'dot-green' : 'dot-red';
  document.getElementById('status-strip').innerHTML = `
    <div class="status-chip"><span class="dot dot-green"></span>${tierLabel}</div>
    <div class="status-chip"><span class="dot ${stravaDot}"></span>${stravaLabel}</div>
    <div class="status-chip">${stravaData.activities.length} pass / 14d</div>`;

  // Tip box — Trixa says
  const lastMsg = [...chatHistory].reverse().find(m => m.role === 'assistant');
  const tip = document.getElementById('tip-container');
  if (lastMsg) {
    const ps = lastMsg.content.split('\n\n').filter(p => p.trim());
    const t = (ps[ps.length-1] || '').substring(0, 200);
    tip.innerHTML = `<div class="tip-box"><div class="tip-label">Tank pa</div><div class="tip-text">${esc(t)}</div></div>`;
  } else {
    tip.innerHTML = `<div class="tip-box"><div class="tip-label">Tank pa</div><div class="tip-text">Fraga Trixa i chatten for att fa personlig coaching!</div></div>`;
  }

  // Upcoming 3 days
  renderUpcoming();

  // Zones
  renderZones();

  // Plan
  const planMsg = [...chatHistory].reverse().find(m =>
    m.role === 'assistant' && ['VECKOPLAN','MAN ','Mandag','**Man'].some(k => m.content?.includes(k))
  );
  document.getElementById('plan-content').innerHTML = planMsg
    ? `<div class="plan-content">${md(planMsg.content)}</div>`
    : `<div class="plan-empty">Be Trixa om en veckoplan i chatten!</div>`;

  renderStravaActivities();
}

function renderUpcoming() {
  const el = document.getElementById('upcoming-body');
  const DAYS_SV = ['Son','Man','Tis','Ons','Tor','Fre','Lor'];
  const planMsg = [...chatHistory].reverse().find(m =>
    m.role === 'assistant' && ['VECKOPLAN','MAN ','Mandag','**Man'].some(k => m.content?.includes(k))
  );
  if (!planMsg) {
    el.innerHTML = '<div style="color:var(--text-dim);font-size:0.85rem;padding:0.3rem 0">Be Trixa om en veckoplan!</div>';
    return;
  }
  // Parse next 3 days from plan
  const today = new Date();
  let html = '';
  for (let i = 0; i < 3; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() + i);
    const dayName = DAYS_SV[d.getDay()];
    const dateStr = `${d.getDate()}/${d.getMonth()+1}`;
    const label = i === 0 ? 'Idag' : i === 1 ? 'Imorgon' : dayName;
    // Try to find this day in the plan text
    const patterns = ['Mandag','Tisdag','Onsdag','Torsdag','Fredag','Lordag','Sondag',
                      'Man ','Tis ','Ons ','Tor ','Fre ','Lor ','Son '];
    const fullDays = ['Sondag','Mandag','Tisdag','Onsdag','Torsdag','Fredag','Lordag'];
    const searchDay = fullDays[d.getDay()];
    const lines = planMsg.content.split('\n');
    let dayLine = '';
    for (let j = 0; j < lines.length; j++) {
      if (lines[j].toLowerCase().includes(searchDay.toLowerCase())) {
        dayLine = lines[j].replace(/\*\*/g,'').replace(/^[-*#]+\s*/, '').trim();
        // Also grab next line if it looks like details
        if (j+1 < lines.length && lines[j+1].trim().startsWith('-')) {
          dayLine += ' ' + lines[j+1].replace(/^[-*]\s*/, '').trim();
        }
        break;
      }
    }
    html += `<div class="upcoming-day">
      <div class="day-label">${label}</div>
      <div class="day-desc">${dayLine ? esc(dayLine.substring(0, 80)) : '<span style="color:var(--text-dim)">Vila?</span>'}</div>
    </div>`;
  }
  el.innerHTML = html;
}

function renderZones() {
  const el = document.getElementById('zones-body');
  // Look for zones in chat history
  const zonesMsg = [...chatHistory].reverse().find(m =>
    m.role === 'assistant' && (m.content?.includes('Z1') || m.content?.includes('Zon 1') || m.content?.includes('FTP'))
  );
  if (!zonesMsg) {
    el.innerHTML = '<div style="color:var(--text-dim);font-size:0.85rem;padding:0.3rem 0">Fraga Trixa: "Berakna mina zoner"</div>';
    return;
  }
  // Show the zones message as formatted text
  const relevant = zonesMsg.content.substring(0, 500);
  el.innerHTML = `<div style="font-size:0.8rem;line-height:1.5">${md(relevant)}</div>`;
}

// ── Chat ──
function renderChat() {
  const c = document.getElementById('chat-messages');
  c.innerHTML = '';
  for (const msg of chatHistory) {
    if (msg._auto) continue;
    appendMsg(msg.role, msg.content, msg.workout);
  }
  c.scrollTop = c.scrollHeight;
}

function appendMsg(role, text, workout, rawHtml) {
  const c = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  let html = rawHtml || md(text);
  if (workout) {
    html += `<div class="workout-btns"><button onclick='pushWorkout(${JSON.stringify(workout).replace(/'/g,"&#39;")})'>Push till Intervals.icu</button></div>`;
  }
  div.innerHTML = html;
  c.appendChild(div);
  c.scrollTop = c.scrollHeight;
}

function handleImageSelect(e) {
  const files = Array.from(e.target.files);
  for (const file of files) {
    if (!file.type.startsWith('image/')) continue;
    if (pendingImages.length >= 4) { alert('Max 4 bilder'); break; }
    const reader = new FileReader();
    reader.onload = (ev) => {
      const dataUrl = ev.target.result;
      const base64 = dataUrl.split(',')[1];
      const mediaType = file.type;
      pendingImages.push({base64, dataUrl, mediaType});
      renderImagePreviews();
    };
    reader.readAsDataURL(file);
  }
  e.target.value = '';
}

function removeImage(idx) {
  pendingImages.splice(idx, 1);
  renderImagePreviews();
}

function renderImagePreviews() {
  const bar = document.getElementById('img-preview-bar');
  if (!pendingImages.length) { bar.innerHTML = ''; return; }
  bar.innerHTML = pendingImages.map((img, i) =>
    `<div class="img-thumb"><img src="${img.dataUrl}"><button class="remove-img" onclick="removeImage(${i})">x</button></div>`
  ).join('');
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  const images = [...pendingImages];
  if (!text && !images.length) return;
  input.value = '';
  pendingImages = [];
  renderImagePreviews();
  document.getElementById('send-btn').disabled = true;

  // Build display content
  let displayHtml = text ? esc(text) : '';
  if (images.length) {
    displayHtml += images.map(img => `<img class="chat-image" src="${img.dataUrl}">`).join('');
  }
  chatHistory.push({role: 'user', content: text || '(bild)', _images: images.length > 0 ? images : undefined});
  appendMsg('user', null, null, displayHtml);

  const typing = document.createElement('div');
  typing.className = 'msg assistant';
  typing.style.opacity = '0.5';
  typing.textContent = 'Trixa tanker...';
  document.getElementById('chat-messages').appendChild(typing);

  try {
    const body = {message: text || '', history: chatHistory.slice(0, -1)};
    if (images.length) {
      body.images = images.map(img => ({base64: img.base64, media_type: img.mediaType}));
    }
    const r = await fetch('/api/chat', {
      method: 'POST', headers: hdrs(),
      body: JSON.stringify(body),
    });
    typing.remove();

    if (!r.ok) {
      const err = await r.json();
      appendMsg('assistant', 'Fel: ' + (err.detail || 'Nagot gick fel'));
      document.getElementById('send-btn').disabled = false;
      return;
    }

    const ct = r.headers.get('content-type') || '';
    if (ct.includes('text/event-stream')) {
      const reader = r.body.getReader();
      const decoder = new TextDecoder();
      let full = '';
      const div = document.createElement('div');
      div.className = 'msg assistant';
      document.getElementById('chat-messages').appendChild(div);
      let buf = '';
      while (true) {
        const {done, value} = await reader.read();
        if (done) break;
        buf += decoder.decode(value, {stream: true});
        const lines = buf.split('\n');
        buf = lines.pop() || '';
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          try {
            const d = JSON.parse(line.slice(6));
            if (d.text) { full += d.text; div.innerHTML = md(full); }
          } catch {}
        }
        document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
      }
      chatHistory.push({role: 'assistant', content: full});
    } else {
      const data = await r.json();
      chatHistory.push({role: 'assistant', content: data.text, workout: data.workout});
      appendMsg('assistant', data.text, data.workout);
    }
    renderHome();
  } catch (e) {
    typing.remove();
    appendMsg('assistant', 'Anslutningsfel. Forsok igen.');
  }
  document.getElementById('send-btn').disabled = false;
}

async function pushWorkout(w) {
  try {
    const r = await fetch('/api/intervals/push', {method:'POST', headers:hdrs(), body:JSON.stringify({workout:w})});
    alert(r.ok ? 'Pushat till Intervals.icu!' : 'Fel: ' + ((await r.json()).detail || '?'));
  } catch { alert('Anslutningsfel'); }
}

// ── Strava ──
let stravaData = {activities: [], connected: false};

const SPORT_ICONS = {Lopning:'🏃', Cykel:'🚴', Sim:'🏊', Styrka:'💪', Promenad:'🚶', Vandring:'🥾'};

async function fetchStrava() {
  try {
    const r = await fetch('/api/strava/activities?days=14', {headers: hdrs()});
    if (r.ok) stravaData = await r.json();
  } catch {}
}

function renderStravaActivities() {
  const el = document.getElementById('strava-activities');
  if (!stravaData.connected) {
    el.innerHTML = `<button class="strava-btn" onclick="connectStrava()">Koppla Strava</button>`;
    return;
  }
  if (!stravaData.activities.length) {
    el.innerHTML = `<div style="color:var(--text-dim);font-size:0.85rem">Inga aktiviteter senaste 14 dagarna</div>
      <button class="strava-btn" onclick="syncStrava()">Synka Strava</button>`;
    return;
  }
  let html = '';
  for (const a of stravaData.activities.slice(0, 7)) {
    const icon = SPORT_ICONS[a.type] || '🏋️';
    const stats = [a.duration_min ? `${Math.round(a.duration_min)}min` : '',
                   a.distance_km ? `${a.distance_km}km` : '',
                   a.pace || '',
                   a.avg_hr ? `${a.avg_hr}bpm` : ''].filter(Boolean).join(' · ');
    html += `<div class="activity-item">
      <div class="activity-icon">${icon}</div>
      <div class="activity-details">
        <div class="name">${esc(a.name || a.type)}</div>
        <div class="stats">${stats}</div>
      </div>
      <div class="activity-date">${a.date?.slice(5) || ''}</div>
    </div>`;
  }
  html += `<button class="strava-btn" onclick="syncStrava()" style="margin-top:0.5rem">Synka Strava</button>`;
  el.innerHTML = html;
}

async function connectStrava() {
  try {
    const r = await fetch('/api/strava/connect', {headers: hdrs()});
    if (!r.ok) {
      const text = await r.text();
      alert('Fel: ' + text);
      return;
    }
    const data = await r.json();
    if (data.url) window.location.href = data.url;
  } catch (e) { alert('Kunde inte koppla Strava: ' + e.message); }
}

async function syncStrava() {
  try {
    const r = await fetch('/api/strava/sync', {method: 'POST', headers: hdrs()});
    if (!r.ok) {
      const text = await r.text();
      try { const j = JSON.parse(text); alert('Sync: ' + (j.detail || text)); }
      catch { alert('Sync fel: ' + text); }
      return;
    }
    const data = await r.json();
    alert(`Synkat ${data.synced} aktiviteter!`);
    await fetchStrava();
    renderStravaActivities();
  } catch (e) { alert('Fel: ' + e.message); }
}

async function disconnectStrava() {
  if (!confirm('Koppla fran Strava?')) return;
  try {
    await fetch('/api/strava/disconnect', {method: 'DELETE', headers: hdrs()});
    stravaData = {activities: [], connected: false};
    renderStravaActivities();
    renderProfile();
  } catch {}
}

function renderStravaProfile() {
  const el = document.getElementById('strava-status');
  if (stravaData.connected) {
    el.innerHTML = `<div class="profile-row"><span class="label">Status</span><span style="color:#2ecc71">Kopplad</span></div>
      <button class="strava-btn disconnect" onclick="disconnectStrava()" style="margin-top:0.5rem">Koppla fran</button>`;
  } else {
    el.innerHTML = `<button class="strava-btn" onclick="connectStrava()">Koppla Strava</button>`;
  }
}

// ── Profile ──
async function renderProfile() {
  document.getElementById('profile-info').innerHTML = `<h3>Konto</h3>
    <div class="profile-row"><span class="label">Namn</span><span>${esc(user?.name||'')}</span></div>
    <div class="profile-row"><span class="label">E-post</span><span>${esc(user?.email||'')}</span></div>`;
  const isPremium = user?.tier === 'premium';
  const isTrialing = user?.trial_days > 0;
  const tl = isTrialing ? `Trial (${user.trial_days}d kvar)` : (isPremium ? 'Premium' : 'Gratis');
  let memberHtml = `<h3>Medlemskap</h3>
    <div class="profile-row"><span class="label">Niva</span><span>${tl}</span></div>`;
  if (isPremium && !isTrialing) {
    memberHtml += `<button class="btn btn-secondary btn-sm" onclick="manageSubscription()" style="margin-top:0.5rem">Hantera abonnemang</button>`;
  } else {
    memberHtml += `
      <div style="margin-top:0.8rem;padding:0.8rem;background:var(--surface2);border-radius:10px">
        <div style="font-weight:600;margin-bottom:0.3rem">Uppgradera till Premium</div>
        <div style="font-size:0.8rem;color:var(--text-dim);margin-bottom:0.6rem">
          Obegransade meddelanden, bilagor, traningspass till klockan
        </div>
        <div style="display:flex;gap:0.5rem">
          <button class="btn btn-sm" onclick="startCheckout('monthly')" style="flex:1">99 kr/man</button>
          <button class="btn btn-sm" onclick="startCheckout('yearly')" style="flex:1;background:var(--accent2)">799 kr/ar</button>
        </div>
      </div>`;
  }
  document.getElementById('membership-section').innerHTML = memberHtml;
  try {
    const r = await fetch('/api/profile', {headers: hdrs()});
    const d = await r.json();
    if (d.profile) {
      document.getElementById('icu-key').value = d.profile.intervals_api_key || '';
      document.getElementById('icu-athlete').value = d.profile.intervals_athlete_id || '';
    }
  } catch {}
  renderStravaProfile();
}

async function saveIntervals() {
  const k = document.getElementById('icu-key').value;
  const a = document.getElementById('icu-athlete').value;
  if (!k || !a) { alert('Fyll i bade API-nyckel och Athlete ID'); return; }
  try {
    const r = await fetch('/api/intervals/save', {method:'POST', headers:hdrs(), body:JSON.stringify({api_key:k, athlete_id:a})});
    alert(r.ok ? 'Sparat!' : 'Kunde inte spara');
  } catch (e) { alert('Fel: ' + e.message); }
}

async function startCheckout(plan) {
  try {
    const r = await fetch('/api/stripe/checkout', {
      method: 'POST', headers: hdrs(),
      body: JSON.stringify({plan}),
    });
    if (!r.ok) {
      const err = await r.json();
      alert(err.detail || 'Kunde inte starta betalning');
      return;
    }
    const data = await r.json();
    if (data.url) window.location.href = data.url;
  } catch (e) { alert('Fel: ' + e.message); }
}

async function manageSubscription() {
  try {
    const r = await fetch('/api/stripe/portal', {method: 'POST', headers: hdrs()});
    if (!r.ok) {
      const err = await r.json();
      alert(err.detail || 'Kunde inte oppna portal');
      return;
    }
    const data = await r.json();
    if (data.url) window.location.href = data.url;
  } catch (e) { alert('Fel: ' + e.message); }
}

async function applyDiscount() {
  const code = document.getElementById('discount-input').value.trim();
  if (!code) return;
  try {
    const r = await fetch('/api/discount/apply', {
      method: 'POST', headers: hdrs(),
      body: JSON.stringify({code}),
    });
    const data = await r.json();
    if (r.ok) {
      alert(data.message || 'Rabattkod aktiverad!');
      // Refresh subscription info
      const sr = await fetch('/api/subscription', {headers: hdrs()});
      if (sr.ok) {
        const sd = await sr.json();
        user.tier = sd.tier;
        user.trial_days = sd.trial_days;
        localStorage.setItem('trixa_user', JSON.stringify(user));
        renderProfile();
        renderHome();
      }
    } else {
      alert(data.detail || 'Ogiltig kod');
    }
  } catch (e) { alert('Fel: ' + e.message); }
}

async function newConversation() {
  try { await fetch('/api/conversation', {method:'DELETE', headers:hdrs()}); } catch {}
  chatHistory = [];
  renderChat(); renderHome();
  switchTab('chat');
}

// ── Init ──
async function showApp() {
  document.getElementById('auth-view').style.display = 'none';
  const main = document.getElementById('main-app');
  main.style.display = 'flex';
  main.style.flexDirection = 'column';
  main.style.height = '100dvh';
  try {
    const r = await fetch('/api/conversation', {headers: hdrs()});
    const d = await r.json();
    chatHistory = d.messages || [];
  } catch { chatHistory = []; }
  await fetchStrava();
  renderHome(); renderChat(); renderProfile();

  // Check for callback results
  const params = new URLSearchParams(window.location.search);
  if (params.get('strava') === 'connected') {
    alert('Strava kopplat!');
    history.replaceState({}, '', '/');
  } else if (params.get('strava') === 'error') {
    alert('Strava-koppling misslyckades');
    history.replaceState({}, '', '/');
  } else if (params.get('payment') === 'success') {
    // Refresh tier after payment
    try {
      const sr = await fetch('/api/subscription', {headers: hdrs()});
      if (sr.ok) {
        const sd = await sr.json();
        user.tier = sd.tier;
        user.trial_days = sd.trial_days;
        localStorage.setItem('trixa_user', JSON.stringify(user));
        renderHome(); renderProfile();
      }
    } catch {}
    alert('Betalning genomford! Valkomna till Premium!');
    history.replaceState({}, '', '/');
  } else if (params.get('payment') === 'cancel') {
    history.replaceState({}, '', '/');
  }
}

if (user) showApp();
else document.getElementById('auth-view').style.display = 'flex';
